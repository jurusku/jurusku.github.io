<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guru Dashboard - JURUSKU</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #1db954;
            --primary-dark: #15803d;
            --bg: #f8fafc;
            --text: #1e293b;
            --danger: #ef4444;
            --danger-light: #fee2e2;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text); 
        }

        /* LOGIN SCREEN STYLES */
        #loginScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }
        .login-card {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        .login-card h2 { margin-top: 0; font-family: 'Fredoka'; color: var(--primary-dark); }
        .login-card input { width: 100%; box-sizing: border-box; margin-bottom: 15px; }
        .login-card button { width: 100%; padding: 12px; font-size: 1rem; }

        /* DASHBOARD STYLES */
        #appScreen {
            display: none;
            padding-bottom: 50px;
        }
        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; padding: 25px 20px; text-align: center;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .container { padding: 20px; max-width: 800px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }

        .filter-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        input, select, button { padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; font-family: inherit; }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--primary-dark); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; font-size: 0.75rem; color: #64748b; text-transform: uppercase; }

        /* MODAL STYLE */
        #modalJurnal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background:white; width:95%; max-width:600px; border-radius:25px; 
            padding:20px; max-height: 90vh; overflow-y: auto; position: relative;
        }

        .btn-close-modal {
            background: var(--danger-light); color: var(--danger); border: none;
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-weight: 800;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; font-size: 1.1rem;
        }
        .btn-close-modal:hover { background: var(--danger); color: white; transform: rotate(90deg); }

        .dash-filter-container { display: flex; justify-content: center; gap: 8px; margin: 15px 0; min-height: 45px; }
        .dash-filter-btn {
            background: #f1f5f9; border: none; padding: 10px 18px;
            border-radius: 12px; cursor: pointer; font-weight: bold; color: #64748b;
        }
        .dash-filter-btn.active { background: var(--primary); color: white; }
        .dash-filter-btn:disabled { opacity: 0; pointer-events: none; } 

        .evaluasi-box {
            background: #fffbeb; border-left: 5px solid #f59e0b;
            padding: 15px; border-radius: 12px; margin: 20px 0;
        }
        textarea {
            width: 100%; height: 80px; border-radius: 10px; border: 1px solid #d1d5db;
            padding: 10px; font-family: inherit; margin-top: 10px; box-sizing: border-box; resize: none;
        }

        .history-card {
            background: #ffffff; border: 1px solid #e2e8f0;
            border-radius: 15px; padding: 15px; margin-bottom: 15px;
        }
        .history-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px dashed #e2e8f0; padding-bottom: 8px; margin-bottom: 10px;
        }
        .item-row { display: flex; font-size: 0.85rem; margin-bottom: 4px; }
        .item-label { width: 110px; color: #64748b; font-weight: 600; }
        .item-val { flex: 1; color: var(--text); }
        .poin-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2>Akses Guru</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 20px;">Silakan masukkan kata sandi Anda</p>
        <input type="password" id="inputPassword" placeholder="Masukkan Password" onkeypress="handleLoginKey(event)">
        <button onclick="prosesLogin()">Masuk Dashboard</button>
    </div>
</div>

<div id="appScreen">
    <header>
        <h1 style="margin:0; font-family:'Fredoka';">Monitoring Guru</h1>
        <p style="margin:5px 0 0 0; opacity:0.8;">Kelola Jurnal & Refleksi Siswa</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="filter-group">
                <select id="filterKelas" onchange="renderTable()">
                    <option value="">Semua Kelas</option>
                </select>
                <input type="text" id="searchName" placeholder="Cari nama siswa..." oninput="renderTable()">
                <button id="btnMuat" onclick="fetchData()">🔄 Muat Data</button>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Nama Siswa</th>
                            <th>Kelas</th>
                            <th style="text-align:center;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="3" style="text-align:center; padding:30px; color:#94a3b8;">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="modalJurnal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="modalNamaSiswa" style="margin:0; font-family:'Fredoka'; color:var(--primary-dark);">Jurnal Siswa</h2>
            <button class="btn-close-modal" onclick="tutupModal()">✕</button>
        </div>

        <div style="text-align:center; margin-top:20px;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
                <button onclick="changeMonth(-1)" class="dash-filter-btn">◀</button>
                <div id="judulBulan" style="font-weight: 800; text-transform: uppercase; color:var(--primary-dark); min-width:150px;">BULAN TAHUN</div>
                <button onclick="changeMonth(1)" class="dash-filter-btn">▶</button>
            </div>
            
            <div id="sectionMinggu">
                <div style="margin-top:10px; font-size:0.8rem; font-weight:bold; color:#64748b;">Minggu ke-</div>
                <div class="dash-filter-container">
                    <button class="dash-filter-btn" id="p-1" onclick="setPekan(1)">1</button>
                    <button class="dash-filter-btn" id="p-2" onclick="setPekan(2)">2</button>
                    <button class="dash-filter-btn" id="p-3" onclick="setPekan(3)">3</button>
                    <button class="dash-filter-btn" id="p-4" onclick="setPekan(4)">4</button>
                </div>
            </div>

            <div id="containerGrafik" style="height: 200px;"><canvas id="chart"></canvas></div>
        </div>

        <div class="evaluasi-box">
            <h3 style="margin:0; font-size:1rem;">📈 Refleksi Guru (Minggu ke-<span id="labelPekan">1</span>)</h3>
            <textarea id="textRefleksi" placeholder="Tuliskan catatan perkembangan siswa untuk minggu ini..."></textarea>
            <button id="btnSimpanRefleksi" onclick="simpanRefleksi()" style="width:100%; margin-top:10px; padding:12px; border-radius:10px;">💾 Simpan Refleksi</button>
        </div>

        <div id="historyContainer"></div>
    </div>
</div>

<script>
    const FIREBASE_URL = "https://jurnalku-49dbd-default-rtdb.asia-southeast1.firebasedatabase.app/jurusku";
    const FIREBASE_USERS_URL = "https://jurnalku-49dbd-default-rtdb.asia-southeast1.firebasedatabase.app/jurusku_users";

    let dbData = {}, usersData = {}, selectedSiswa = "", chart = null;
    let dashDate = new Date(), currentPekan = 1;

    // FUNGSI LOGIN
    function prosesLogin() {
        const pass = document.getElementById("inputPassword").value;
        if(pass === "Guru123") {
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("appScreen").style.display = "block";
            fetchData(); // Muat data hanya jika login sukses
        } else {
            alert("Password salah! Akses ditolak.");
            document.getElementById("inputPassword").value = "";
        }
    }

    function handleLoginKey(e) {
        if (e.key === "Enter") prosesLogin();
    }

    function formatTglIndo(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function getCurrentWeek(targetDate = new Date()) {
        const day = targetDate.getDate();
        if (day <= 7) return 1;
        if (day <= 14) return 2;
        if (day <= 21) return 3;
        return 4;
    }

    async function fetchData() {
        const btn = document.getElementById("btnMuat");
        if(btn) btn.innerText = "⏳ Memuat...";
        try {
            const [r1, r2] = await Promise.all([
                fetch(FIREBASE_URL + ".json").then(res => res.json()),
                fetch(FIREBASE_USERS_URL + ".json").then(res => res.json())
            ]);
            dbData = r1 || {}; 
            usersData = r2 || {};
            updateKelasFilter();
            renderTable();
        } catch (e) { 
            alert("Gagal koneksi ke server."); 
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="3" style="text-align:center; padding:30px; color:#ef4444;">Gagal memuat data.</td></tr>';
        } finally {
            if(btn) btn.innerText = "🔄 Muat Data";
        }
    }

    function updateKelasFilter() {
        const filterKelas = document.getElementById('filterKelas');
        const listKelas = new Set();
        Object.values(usersData).forEach(u => { if(u.kelas) listKelas.add(u.kelas); });
        filterKelas.innerHTML = '<option value="">Semua Kelas</option>';
        Array.from(listKelas).sort().forEach(k => {
            filterKelas.innerHTML += `<option value="${k}">${k}</option>`;
        });
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const search = document.getElementById('searchName').value.toLowerCase();
        const kls = document.getElementById('filterKelas').value;
        tbody.innerHTML = "";

        let count = 0;
        Object.keys(usersData).forEach(uKey => {
            const user = usersData[uKey];
            const nama = (user.nama || uKey).toLowerCase();
            const kelasSiswa = user.kelas || "-";

            if (search && !nama.includes(search)) return;
            if (kls && kelasSiswa !== kls) return;

            count++;
            tbody.innerHTML += `<tr>
                <td><strong>${user.nama || uKey}</strong></td>
                <td><span style="background:#f1f5f9; padding:4px 8px; border-radius:6px; font-size:0.8rem; font-weight:600; color:#64748b;">${kelasSiswa}</span></td>
                <td style="text-align:center;"><button onclick="bukaModal('${uKey}')" style="font-size:0.8rem; padding:8px 15px;">Lihat Jurnal</button></td>
            </tr>`;
        });

        if(count === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:30px; color:#94a3b8;">Tidak ada data ditemukan</td></tr>';
        }
    }

    function bukaModal(uKey) {
        selectedSiswa = uKey;
        dashDate = new Date();
        currentPekan = getCurrentWeek();
        document.getElementById('modalNamaSiswa').innerText = usersData[uKey]?.nama || uKey;
        document.getElementById('modalJurnal').style.display = 'flex';
        updateUI();
    }

    function tutupModal() { 
        document.getElementById('modalJurnal').style.display = 'none'; 
        if(chart) chart.destroy();
    }

    async function updateUI() {
        const today = new Date();
        const blnNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        const bulanTahun = `${blnNames[dashDate.getMonth()]}_${dashDate.getFullYear()}`;
        
        document.getElementById("judulBulan").innerText = `${blnNames[dashDate.getMonth()]} ${dashDate.getFullYear()}`;
        document.getElementById("labelPekan").innerText = currentPekan;

        const btnNextMonth = document.querySelector("button[onclick='changeMonth(1)']");
        const isCurrentMonthOrFuture = dashDate.getFullYear() > today.getFullYear() || 
                                      (dashDate.getFullYear() === today.getFullYear() && dashDate.getMonth() >= today.getMonth());
        btnNextMonth.style.visibility = isCurrentMonthOrFuture ? "hidden" : "visible";

        for(let i=1; i<=4; i++) {
            const btnPekan = document.getElementById(`p-${i}`);
            const isCurrentMonth = dashDate.getMonth() === today.getMonth() && dashDate.getFullYear() === today.getFullYear();
            
            if (isCurrentMonth && i > getCurrentWeek(today)) {
                btnPekan.disabled = true;
            } else {
                btnPekan.disabled = false;
            }
        }

        document.querySelectorAll(".dash-filter-btn").forEach(b => b.classList.remove("active"));
        const activeBtn = document.getElementById(`p-${currentPekan}`);
        if(activeBtn) activeBtn.classList.add("active");

        const refField = document.getElementById('textRefleksi');
        refField.value = "Memuat...";
        try {
            const res = await fetch(`${FIREBASE_URL}/catatan_guru/${selectedSiswa}/${bulanTahun}/Pekan_${currentPekan}.json`);
            const val = await res.json();
            refField.value = val || "";
        } catch(e) { refField.value = ""; }

        renderGrafik();
        renderHistory();
    }

    function renderGrafik() {
        const today = new Date();
        today.setHours(0,0,0,0);

        let labels = []; let dataPoin = [];
        let th = dashDate.getFullYear(), bl = (dashDate.getMonth() + 1).toString().padStart(2, '0');
        let startDay = (currentPekan - 1) * 7 + 1;

        for (let i = 0; i < 7; i++) {
            let tglNum = startDay + i;
            let tglStr = tglNum.toString().padStart(2, '0');
            let dateKey = `${th}-${bl}-${tglStr}`;
            let checkDate = new Date(th, dashDate.getMonth(), tglNum);

            if (checkDate > today) break;

            labels.push(tglStr);
            dataPoin.push((dbData[dateKey] && dbData[dateKey][selectedSiswa]) ? dbData[dateKey][selectedSiswa].poin : 0);
        }

        const ctx = document.getElementById("chart");
        if (chart) chart.destroy();

        if (labels.length === 0) {
            ctx.style.display = "none";
            return;
        } else {
            ctx.style.display = "block";
        }

        chart = new Chart(ctx, {
            type: "line",
            data: {
                labels: labels,
                datasets: [{ 
                    label: 'Poin',
                    data: dataPoin, 
                    borderColor: "#1db954", 
                    tension: 0.4, 
                    fill: true, 
                    backgroundColor: "rgba(29,185,84,0.1)",
                    pointBackgroundColor: "#1db954",
                    pointRadius: 4
                }]
            },
            options: { 
                plugins: { legend: { display: false } }, 
                maintainAspectRatio: false,
                scales: { 
                    y: { beginAtZero: true, ticks: { stepSize: 5 } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    function renderHistory() {
        const today = new Date();
        today.setHours(0,0,0,0);
        
        const container = document.getElementById("historyContainer");
        container.innerHTML = `<h4 style='margin:20px 0 10px 0; border-top: 1px solid #eee; padding-top:15px;'>📅 Detail Aktivitas Minggu ke-${currentPekan}</h4>`;
        
        let th = dashDate.getFullYear(), bl = (dashDate.getMonth() + 1).toString().padStart(2, '0');
        let startDay = (currentPekan - 1) * 7 + 1;
        let found = false;

        for (let i = 0; i < 7; i++) {
            let tglNum = startDay + i;
            let tglStr = tglNum.toString().padStart(2, '0');
            let dateKey = `${th}-${bl}-${tglStr}`;
            let checkDate = new Date(th, dashDate.getMonth(), tglNum);

            if (checkDate > today) continue;

            let h = dbData[dateKey]?.[selectedSiswa];
            if (h && h.poin > 0) {
                found = true;
                let sholat = ['Subuh', 'Dzuhur', 'Ashar', 'Maghrib', 'Isya'].filter(s => h['sholat_'+s]).map(s => "✅"+s).join(", ");
                
                container.innerHTML += `
                <div class="history-card">
                    <div class="history-header"><strong>${formatTglIndo(dateKey)}</strong> <span class="poin-badge">${h.poin} Poin</span></div>
                    <div class="item-row"><div class="item-label">🌅 Bangun</div><div class="item-val">${h.bangun || "-"}</div></div>
                    <div class="item-row"><div class="item-label">🙏 Ibadah</div><div class="item-val">${sholat || "Kosong"}</div></div>
                    <div class="item-row"><div class="item-label">⚽ Olahraga</div><div class="item-val">${h.inputs?.olahraga || "-"}</div></div>
                    <div class="item-row"><div class="item-label">🥗 Makan</div><div class="item-val">${h.inputs?.makan || "-"}</div></div>
                    <div class="item-row"><div class="item-label">💡 Belajar</div><div class="item-val">${h.inputs?.belajar || "-"}</div></div>
                    <div class="item-row"><div class="item-label">🤝 Sosial</div><div class="item-val">${h.inputs?.masyarakat || "-"}</div></div>
                    <div class="item-row"><div class="item-label">🌙 Tidur</div><div class="item-val">${h.tidur_val || "-"}</div></div>
                </div>`;
            }
        }
        if(!found) container.innerHTML += `<p style='text-align:center; color:#94a3b8; font-size:0.8rem; padding:20px; background:#f8fafc; border-radius:15px;'>Belum ada aktivitas tercatat hingga saat ini.</p>`;
    }

    async function simpanRefleksi() {
        const btn = document.getElementById("btnSimpanRefleksi");
        const blnNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        const bulanTahun = `${blnNames[dashDate.getMonth()]}_${dashDate.getFullYear()}`;
        const msg = document.getElementById('textRefleksi').value;
        const path = `catatan_guru/${selectedSiswa}/${bulanTahun}/Pekan_${currentPekan}`;

        btn.innerText = "⌛ Menyimpan...";
        btn.disabled = true;
        try {
            await fetch(`${FIREBASE_URL}/${path}.json`, { method: 'PUT', body: JSON.stringify(msg) });
            alert("Refleksi berhasil disimpan!");
        } catch(e) { alert("Gagal simpan."); } finally {
            btn.innerText = "💾 Simpan Refleksi";
            btn.disabled = false;
        }
    }

    function setPekan(p) { currentPekan = p; updateUI(); }

    function changeMonth(v) { 
        const today = new Date();
        const tempDate = new Date(dashDate);
        tempDate.setMonth(tempDate.getMonth() + v);

        if (v > 0 && (tempDate.getFullYear() > today.getFullYear() || 
           (tempDate.getFullYear() === today.getFullYear() && tempDate.getMonth() > today.getMonth()))) {
            return; 
        }

        dashDate.setMonth(dashDate.getMonth() + v); 
        currentPekan = 1; 
        updateUI(); 
    }
</script>
</body>
</html>
