<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Asesmen Siswa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #f0f4ff;
            background-image: radial-gradient(at 0% 0%, #ffdee9 0, transparent 50%), radial-gradient(at 100% 0%, #b5fffc 0, transparent 50%), radial-gradient(at 50% 100%, #fff5bc 0, transparent 50%);
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
            font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden;
        }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 350px; pointer-events: none; }
        
        .toast {
            background: rgba(45, 52, 54, 0.9); backdrop-filter: blur(10px); color: white; padding: 12px 20px; border-radius: 20px;
            margin-bottom: 10px; font-size: 0.9rem; font-weight: 600; box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: center;
            animation: toastIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .main-wrapper { 
            width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%); padding: 30px 20px; border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid rgba(255, 255, 255, 0.5); text-align: center;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding-bottom: 10px;
            margin-bottom: 25px;
            border-bottom: 3px double #2D3436;
        }

        .header-logo {
            width: 65px;
            height: 65px;
            object-fit: contain;
        }

        .header-text-group {
            display: flex;
            flex-direction: column;
            text-align: center;
            flex: 1;
        }

        header h1 { 
            font-weight: 800; 
            font-size: 1.1rem; 
            text-transform: uppercase;
            color: #2D3436; 
            line-height: 1.2;
        }

        header h3 {
            font-size: 1.3rem;
            font-weight: 800;
            color: #2D3436;
            margin: 2px 0;
        }

        header p { 
            font-size: 0.9rem; 
            color: #2D3436; 
            font-weight: 600;
            letter-spacing: 1px;
        }

        .menu-container { display: flex; flex-direction: column; gap: 14px; }

        .menu-card {
            display: flex; align-items: center; padding: 18px; border-radius: 20px; background: white;
            border: 1px solid #f0f0f0; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .menu-card:active { transform: scale(0.96); }

        .icon { width: 55px; height: 55px; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: 800; color: white; flex-shrink: 0; }
        
        .content { flex-grow: 1; margin-left: 15px; text-align: left; }
        .content h2 { font-size: 1.1rem; font-weight: 700; color: #2D3436; }
        
        .arrow { color: #DFE6E9; font-size: 1.1rem; }
        
        .c-7 .icon { background: linear-gradient(135deg, #FF9F43, #FF6B6B); }
        .c-8 .icon { background: linear-gradient(135deg, #4834D4, #686DE0); }
        .c-9 .icon { background: linear-gradient(135deg, #27AE60, #2ECC71); }
        .c-mapel .icon { background: #F1F2F6; box-shadow: none; font-size: 1.6rem; }

        /* --- BUTTON KEMBALI TEMA LIQUID iOS TERBARU --- */
        .btn-back { 
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px) saturate(200%);
            -webkit-backdrop-filter: blur(15px) saturate(200%);
            color: #4834D4; /* Warna primer iOS Blue-Indigo */
            border: 1px solid rgba(255, 255, 255, 0.6); 
            padding: 16px; 
            border-radius: 22px; 
            font-size: 1.05rem; 
            cursor: pointer; 
            font-weight: 700; 
            margin-top: 25px; 
            width: 100%; 
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        
        /* Efek Kilauan Liquid saat Hover/Sentuh */
        .btn-back:hover { 
            background: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(31, 38, 135, 0.15);
        }

        .btn-back:active { 
            transform: scale(0.95) translateY(0);
            background: rgba(255, 255, 255, 0.8);
            transition: 0.1s;
        }

        /* Border Glow lembut */
        .btn-back::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.4s;
            pointer-events: none;
        }

        .btn-back:hover::after { opacity: 1; }
        /* ----------------------------------------------- */

        .hidden { display: none !important; }
        
        .admin-link { display: block; margin-top: 30px; color: #B2BEC3; text-decoration: none; font-size: 0.8rem; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-view { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div class="main-wrapper">
        <header>
            <img src="logo.ico" alt="Logo" class="header-logo">
            <div class="header-text-group">
                <h1 id="main-title">Penilaian Sumatif Akhir Tahun</h1>
                <h3 id="school-name">SMP Negeri 3 Babat</h3>
                <p id="main-desc">TP 2025/2026</p>
            </div>
        </header>

        <nav id="view-class" class="menu-container animate-view">
            <button class="menu-card c-7" onclick="showMapel('7')">
                <div class="icon">7</div>
                <div class="content"><h2>Kelas VII</h2></div>
                <div class="arrow">➜</div>
            </button>
            <button class="menu-card c-8" onclick="showMapel('8')">
                <div class="icon">8</div>
                <div class="content"><h2>Kelas VIII</h2></div>
                <div class="arrow">➜</div>
            </button>
            <button class="menu-card c-9" onclick="showMapel('9')">
                <div class="icon">9</div>
                <div class="content"><h2>Kelas IX</h2></div>
                <div class="arrow">➜</div>
            </button>
            <!-- <a href="admin.html" class="admin-link">⚙️ Mode Admin</a> -->
        </nav>

        <nav id="view-mapel" class="menu-container hidden">
            <div id="mapel-list" class="menu-container"></div>
            <button class="btn-back" onclick="showClass()">Kembali</button>
        </nav>
    </div>

    <script>
        const FIREBASE_URL = "https://linke-asesmen-default-rtdb.asia-southeast1.firebasedatabase.app/asesmen.json";

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
        }

        function getMapelEmoji(name) {
            const n = name.toLowerCase();
            if (n.includes('matematika') || n.includes('mtk')) return '📐';
            if (n.includes('ipa')) return '🧪';
            if (n.includes('ips')) return '🌍';
            if (n.includes('indo')) return '🇮🇩';
            if (n.includes('inggris')) return '🇬🇧';
            if (n.includes('agama')) return '🕌';
            if (n.includes('pjok')) return '⚽';
            if (n.includes('seni')) return '🎨';
            if (n.includes('tik') || n.includes('informatika')) return '💻';
            return '📚';
        }

        async function showMapel(kelas) {
            showToast("Memuat data...");
            try {
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();

                if(!data) { showToast("Belum ada data kuis."); return; }

                document.getElementById('view-class').classList.add('hidden');
                const viewMapel = document.getElementById('view-mapel');
                viewMapel.classList.remove('hidden');
                viewMapel.classList.add('animate-view');
                
                document.getElementById('main-title').innerText = "Daftar Mata Pelajaran";
                document.getElementById('school-name').innerText = "Kelas " + kelas;
                document.getElementById('main-desc').innerText = "Silahkan pilih kuis";
                
                const list = document.getElementById('mapel-list');
                list.innerHTML = '';
                
                let visibleCount = 0;
                const mapels = data[kelas] || {};

                for (let m in mapels) {
                    if (mapels[m].visible) {
                        visibleCount++;
                        const btn = document.createElement('button');
                        btn.className = 'menu-card c-mapel';
                        btn.innerHTML = `<div class="icon">${getMapelEmoji(m)}</div><div class="content"><h2>${m}</h2></div><div class="arrow">🚀</div>`;
                        btn.onclick = () => {
                            if(mapels[m].link) window.open(mapels[m].link.startsWith('http') ? mapels[m].link : 'https://'+mapels[m].link, '_blank');
                            else showToast("Link belum tersedia.");
                        };
                        list.appendChild(btn);
                    }
                }

                if(visibleCount === 0) {
                    list.innerHTML = "<div style='padding:40px; color:#b2bec3;'>Tidak ada kuis aktif.</div>";
                }
            } catch (e) {
                showToast("Gagal terhubung ke server.");
            }
        }

        function showClass() {
            document.getElementById('view-mapel').classList.add('hidden');
            document.getElementById('view-class').classList.remove('hidden');
            document.getElementById('main-title').innerText = "Penilaian Sumatif Akhir Tahun";
            document.getElementById('school-name').innerText = "SMP Negeri 3 Babat";
            document.getElementById('main-desc').innerText = "TP 2025/2026";
        }
    </script>
</body>
</html>
